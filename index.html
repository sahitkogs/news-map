<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <span class="topbar-title">News Map</span>
    <span class="topbar-subtitle">Track news &amp; videos for any place</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="point-counter" id="pointCounter">0 / 10 points</div>
  <div class="topbar-divider"></div>
  <div class="layer-toggle">
    <button class="layer-btn theme-toggle" id="themeToggle" title="Toggle day/night">
      <span class="theme-icon moon">&#9790;</span>
      <span class="theme-icon sun">&#9728;</span>
    </button>
    <button class="layer-btn active" data-layer="satellite">Satellite</button>
  </div>
</header>

<div class="main-layout">
  <div class="map-container">
    <div id="map"></div>
    <button class="home-btn" id="homeBtn" title="Reset view">&#8962;</button>
  </div>
  <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-drag-zone" id="sidebarHandle">
      <div class="sidebar-drag-handle"><span class="drag-bar"></span></div>
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <h2>Latest Updates</h2>
          <div class="view-info">
            <span><span class="count" id="visibleCount">0</span> in view</span>
          </div>
        </div>
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="articles">Articles</button>
          <button class="sidebar-tab" data-tab="videos">YouTube</button>
        </div>
      </div>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
<script src="app.js"></script>
</body>
</html>
